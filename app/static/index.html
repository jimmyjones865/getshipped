<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>get shipt</title>
<style>
  :root {
    --bg:      #2e3440;
    --surface: #3b4252;
    --border:  #434c5e;
    --subtle:  #4c566a;
    --text:    #eceff4;
    --muted:   #d8dee9;
    --dim:     #a0a8b8;
    --accent:  #88c0d0;
    --ok:      #a3be8c;
    --warn:    #ebcb8b;
    --err:     #bf616a;
    --blue:    #5e81ac;
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-mono: 'JuliaMono', 'Fira Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .layout {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dim);
    margin-bottom: 12px;
  }

  label {
    display: block;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 3px;
    margin-top: 10px;
  }

  label:first-of-type { margin-top: 0; }

  input, textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
  }

  .row { display: flex; gap: 8px; }
  .row .grow { flex: 1; }
  .row .w80 { width: 80px; flex-shrink: 0; }
  .row .w120 { width: 120px; flex-shrink: 0; }
  .row .w60 { width: 60px; flex-shrink: 0; }

  .weight-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .weight-row .w-input { width: 100px; }

  .quick-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn-quick {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 6px 12px;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-quick:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }

  .product-option {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    padding: 8px 10px;
    transition: border-color 0.15s;
  }

  .product-option:has(input:checked) {
    border-color: var(--accent);
  }

  .product-option input[type=radio] {
    width: auto;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .product-label { font-size: 13px; line-height: 1.3; }
  .product-sub { font-size: 11px; color: var(--dim); }

  .btn-ship {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 4px;
    color: var(--bg);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 600;
    padding: 12px;
    transition: opacity 0.15s;
  }

  .btn-ship:hover { opacity: 0.88; }
  .btn-ship:disabled { opacity: 0.4; cursor: not-allowed; }

  .notice {
    border-radius: 4px;
    font-size: 13px;
    padding: 10px 12px;
    display: none;
  }

  .notice.ok  { background: #2d3b2a; border: 1px solid var(--ok);  color: var(--ok);  display: block; }
  .notice.err { background: #3b2a2a; border: 1px solid var(--err); color: var(--err); display: block; }
  .notice.warn { background: #3b3624; border: 1px solid var(--warn); color: var(--warn); display: block; }

  .tracking {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
    margin-top: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    color: var(--dim);
    font-size: 11px;
    font-weight: 600;
    text-align: left;
    padding: 4px 8px 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  td {
    padding: 6px 8px 6px 0;
    border-top: 1px solid var(--border);
    color: var(--muted);
    vertical-align: middle;
  }

  td.mono {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
  }

  td.time { color: var(--dim); font-size: 12px; white-space: nowrap; }

  .badge {
    background: var(--border);
    border-radius: 3px;
    font-size: 11px;
    padding: 2px 6px;
    white-space: nowrap;
  }

  #log-empty { color: var(--dim); font-size: 13px; padding: 12px 0; }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    font-size: 12px;
    color: var(--dim);
  }

  .btn-page {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 10px;
  }

  .btn-page:disabled { opacity: 0.3; cursor: default; }
  .btn-page:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

  /* Address section */
  .addr-hint {
    color: var(--dim);
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .addr-cols {
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  .addr-paste {
    flex: 0 0 38%;
    min-width: 140px;
    display: flex;
    flex-direction: column;
  }

  .addr-paste textarea {
    flex: 1;
    resize: none;
    min-height: 120px;
  }

  .addr-fields {
    flex: 1;
    min-width: 0;
  }

  .opt {
    color: var(--dim);
    font-size: 10px;
    font-weight: normal;
    text-transform: none;
    letter-spacing: 0;
  }
</style>
</head>
<body>
<div class="layout">
  <h1>get shipt</h1>

  <!-- Address -->
  <div class="card">
    <div class="card-title">Empfänger</div>

    <p class="addr-hint">Adresse links als Block einfügen — wird automatisch erkannt und in die Felder übertragen. Oder Felder rechts direkt ausfüllen.</p>

    <div class="addr-cols">
      <div class="addr-paste">
        <label>Adresse einfügen</label>
        <textarea id="paste-area" placeholder="Max Mustermann&#10;Musterstraße 42&#10;12345 Berlin"></textarea>
      </div>

      <div class="addr-fields">
        <label>Name 1</label>
        <input id="f-name" type="text" autocomplete="off">

        <label>Name 2 <span class="opt">optional</span></label>
        <input id="f-name2" type="text" autocomplete="off">

        <label>Name 3 <span class="opt">optional</span></label>
        <input id="f-name3" type="text" autocomplete="off">

        <div class="row" style="margin-top:10px">
          <div class="grow">
            <label>Straße</label>
            <input id="f-street" type="text" autocomplete="off">
          </div>
          <div class="w80">
            <label>Nr.</label>
            <input id="f-house" type="text" autocomplete="off">
          </div>
        </div>

        <div class="row" style="margin-top:10px">
          <div class="w80">
            <label>PLZ</label>
            <input id="f-zip" type="text" autocomplete="off">
          </div>
          <div class="grow">
            <label>Stadt</label>
            <input id="f-city" type="text" autocomplete="off">
          </div>
          <div class="w60">
            <label>Land</label>
            <input id="f-country" type="text" value="DE" maxlength="3" autocomplete="off" style="text-transform:uppercase">
          </div>
        </div>

        <label>E-Mail <span class="opt">optional</span></label>
        <input id="f-email" type="email" autocomplete="off">
      </div>
    </div>

    <div id="len-warn" class="notice" style="margin-top:10px"></div>
  </div>

  <!-- Weight -->
  <div class="card">
    <div class="card-title">Gewicht</div>
    <div class="weight-row">
      <div class="w-input">
        <input id="f-weight" type="text" inputmode="decimal" placeholder="0,0" autocomplete="off">
      </div>
      <span style="color:var(--dim);padding-bottom:8px">kg</span>
      <div class="quick-btns">
        <button class="btn-quick" onclick="setWeight(1)">1 kg</button>
        <button class="btn-quick" onclick="setWeight(2)">2 kg</button>
        <button class="btn-quick" onclick="setWeight(5)">5 kg</button>
        <button class="btn-quick" onclick="setWeight(7)">7 kg</button>
        <button class="btn-quick" onclick="setWeight(10)">10 kg</button>
      </div>
    </div>
  </div>

  <!-- Product -->
  <div class="card">
    <div class="card-title">Produkt</div>
    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- Ref -->
  <div class="card">
    <div class="card-title">Optional: Sendungsreferenz</div>
    <input id="f-ref" type="text" placeholder="Automatisch" autocomplete="off">
  </div>

  <!-- Status -->
  <div id="notice" class="notice"></div>

  <!-- Submit -->
  <button class="btn-ship" id="btn-ship" onclick="ship()">Label drucken</button>

  <!-- Log -->
  <div class="card">
    <div class="card-title">Verlauf</div>
    <div id="log-container">
      <div id="log-empty">Noch keine Labels gedruckt.</div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="btn-page" id="btn-prev" onclick="changePage(-1)">← Zurück</button>
      <span id="page-info"></span>
      <button class="btn-page" id="btn-next" onclick="changePage(1)">Weiter →</button>
    </div>
  </div>
</div>

<script>
let products = [];
let allLabels = [];
let currentPage = 0;
const PAGE_SIZE = 10;

const FIELD_LIMITS = {
  'f-name': 50, 'f-name2': 50, 'f-name3': 50,
  'f-street': 50, 'f-zip': 10, 'f-city': 40,
};
const FIELD_LABELS = {
  'f-name': 'Name 1', 'f-name2': 'Name 2', 'f-name3': 'Name 3',
  'f-street': 'Straße', 'f-zip': 'PLZ', 'f-city': 'Stadt',
};

function checkLengths() {
  const warns = [];
  for (const [id, max] of Object.entries(FIELD_LIMITS)) {
    const val = document.getElementById(id)?.value || '';
    if (val.length > max) {
      warns.push(`${FIELD_LABELS[id]} (${val.length}/${max})`);
    }
  }
  const el = document.getElementById('len-warn');
  if (warns.length) {
    el.className = 'notice warn';
    el.textContent = 'Zu lang, DHL könnte ablehnen: ' + warns.join(', ');
  } else {
    el.className = 'notice';
    el.textContent = '';
  }
}

async function init() {
  const res = await fetch('/api/products');
  products = await res.json();
  renderProducts();
  loadLog();

  document.getElementById('f-weight').addEventListener('input', autoSelectProduct);
  document.getElementById('f-country').addEventListener('input', autoSelectProduct);
}

function renderProducts() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  for (const p of products) {
    const label = document.createElement('label');
    label.className = 'product-option';
    const sub = p.max_weight_g ? `bis ${(p.max_weight_g/1000).toLocaleString('de')} kg` : '';
    label.innerHTML = `
      <input type="radio" name="product" value="${p.code}">
      <div class="product-label">
        ${p.name}
        ${sub ? `<div class="product-sub">${sub}</div>` : ''}
      </div>`;
    grid.appendChild(label);
  }
  autoSelectProduct();
}

function autoSelectProduct() {
  const weight_g = parseWeight();
  const country = document.getElementById('f-country').value.trim().toUpperCase();
  const domestic = (country === 'DE' || country === 'DEU' || country === '');

  let best = null;
  const eligible = products.filter(p => p.domestic === domestic);
  eligible.sort((a, b) => {
    if (a.max_weight_g == null) return 1;
    if (b.max_weight_g == null) return -1;
    return a.max_weight_g - b.max_weight_g;
  });
  for (const p of eligible) {
    if (p.max_weight_g == null || weight_g <= p.max_weight_g) {
      best = p.code;
      break;
    }
  }
  if (!best && eligible.length) best = eligible[eligible.length - 1].code;
  if (best) {
    const radio = document.querySelector(`input[name=product][value="${best}"]`);
    if (radio) radio.checked = true;
  }
}

function parseWeight() {
  const raw = document.getElementById('f-weight').value.trim().replace(',', '.');
  const kg = parseFloat(raw);
  return isNaN(kg) ? 0 : Math.round(kg * 1000);
}

function setWeight(kg) {
  document.getElementById('f-weight').value = kg.toString().replace('.', ',');
  autoSelectProduct();
}

let pasteTimer = null;
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('paste-area').addEventListener('input', () => {
    clearTimeout(pasteTimer);
    pasteTimer = setTimeout(parsePaste, 300);
  });
  for (const id of Object.keys(FIELD_LIMITS)) {
    document.getElementById(id).addEventListener('input', checkLengths);
  }
});

async function parsePaste() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) return;
  const res = await fetch('/api/parse-address', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text}),
  });
  const addr = await res.json();
  document.getElementById('f-name').value    = addr.name    || '';
  document.getElementById('f-name2').value   = addr.name2   || '';
  document.getElementById('f-name3').value   = addr.name3   || '';
  document.getElementById('f-street').value  = addr.street  || '';
  document.getElementById('f-house').value   = addr.house   || '';
  document.getElementById('f-zip').value     = addr.zip     || '';
  document.getElementById('f-city').value    = addr.city    || '';
  if (addr.country) document.getElementById('f-country').value = addr.country.toUpperCase();
  autoSelectProduct();
  checkLengths();
}

async function ship() {
  const weight_g = parseWeight();
  if (!weight_g) { showNotice('err', 'Gewicht fehlt oder ungültig.'); return; }

  const name = document.getElementById('f-name').value.trim();
  const street = document.getElementById('f-street').value.trim();
  const zip = document.getElementById('f-zip').value.trim();
  const city = document.getElementById('f-city').value.trim();
  if (!name || !street || !zip || !city) {
    showNotice('err', 'Bitte Name 1, Straße, PLZ und Stadt angeben.');
    return;
  }

  const product_code = document.querySelector('input[name=product]:checked')?.value || '';

  const btn = document.getElementById('btn-ship');
  btn.disabled = true;
  btn.textContent = 'Wird gedruckt…';
  hideNotice();

  try {
    const res = await fetch('/api/ship', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name,
        name2:        document.getElementById('f-name2').value.trim(),
        name3:        document.getElementById('f-name3').value.trim(),
        street,
        house:        document.getElementById('f-house').value.trim(),
        zip,
        city,
        country:      document.getElementById('f-country').value.trim() || 'DE',
        email:        document.getElementById('f-email').value.trim(),
        weight_g,
        product_code,
        ref_no:       document.getElementById('f-ref').value.trim(),
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      showNotice('err', data.detail || 'Fehler beim Erstellen des Labels.');
      return;
    }

    let msg = `Label gedruckt — ${data.tracking_number}`;
    if (!data.printed) msg = `Label erstellt (Druckfehler) — ${data.tracking_number}`;
    const cls = data.warnings?.length ? 'warn' : 'ok';
    const extra = data.warnings?.length ? `\n${data.warnings.join('\n')}` : '';
    showNotice(cls, msg + extra, data.tracking_number);

    // Clear form
    document.getElementById('paste-area').value = '';
    ['f-name','f-name2','f-name3','f-street','f-house','f-zip','f-city','f-email','f-ref'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-country').value = 'DE';
    document.getElementById('f-weight').value = '';
    checkLengths();
    autoSelectProduct();
    loadLog();

  } catch (e) {
    showNotice('err', 'Netzwerkfehler: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Label drucken';
  }
}

function showNotice(cls, text, tracking) {
  const el = document.getElementById('notice');
  el.className = 'notice ' + cls;
  if (tracking) {
    el.innerHTML = text.split(tracking).join(`<span class="tracking">${tracking}</span>`);
  } else {
    el.textContent = text;
  }
}

function hideNotice() {
  const el = document.getElementById('notice');
  el.className = 'notice';
  el.textContent = '';
}

async function loadLog() {
  const res = await fetch('/api/labels');
  allLabels = await res.json();
  currentPage = 0;
  renderLog();
}

function changePage(dir) {
  const totalPages = Math.ceil(allLabels.length / PAGE_SIZE);
  currentPage = Math.max(0, Math.min(currentPage + dir, totalPages - 1));
  renderLog();
}

function renderLog() {
  const container = document.getElementById('log-container');
  const empty = document.getElementById('log-empty');
  const pagination = document.getElementById('pagination');

  if (!allLabels.length) {
    empty.style.display = '';
    const table = container.querySelector('table');
    if (table) table.remove();
    pagination.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  let table = container.querySelector('table');
  if (!table) {
    table = document.createElement('table');
    table.innerHTML = `<thead><tr>
      <th>Zeit</th><th>Empfänger</th><th>Produkt</th><th>Gewicht</th><th>Sendungsnummer</th>
    </tr></thead><tbody></tbody>`;
    container.appendChild(table);
  }

  const totalPages = Math.ceil(allLabels.length / PAGE_SIZE);
  const page = allLabels.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

  const tbody = table.querySelector('tbody');
  tbody.innerHTML = page.map(r => {
    const dt = new Date(r.created_at);
    const time = dt.toLocaleTimeString('de', {hour:'2-digit', minute:'2-digit'});
    const date = dt.toLocaleDateString('de', {day:'2-digit', month:'2-digit'});
    const kg = (r.weight_g / 1000).toLocaleString('de', {minimumFractionDigits:1, maximumFractionDigits:3});
    const trackUrl = `https://www.dhl.de/de/privatkunden/pakete-empfangen/verfolgen.html?idc=${esc(r.tracking_number)}`;
    return `<tr>
      <td class="time">${date} ${time}</td>
      <td>${esc(r.recipient_name)}<br><span style="color:var(--dim);font-size:12px">${esc(r.recipient_zip)} ${esc(r.recipient_city)} ${esc(r.recipient_country)}</span></td>
      <td><span class="badge">${esc(r.product_name)}</span></td>
      <td style="white-space:nowrap">${kg} kg</td>
      <td class="mono"><a href="${trackUrl}" target="_blank" style="color:var(--accent);text-decoration:none">${esc(r.tracking_number)}</a></td>
    </tr>`;
  }).join('');

  pagination.style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;
  document.getElementById('page-info').textContent =
    `${currentPage + 1} / ${totalPages}`;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
